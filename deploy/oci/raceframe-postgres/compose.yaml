services:
  postgres:
    image: postgres:16
    container_name: raceframe-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      raceframe-internal:
        aliases:
          - raceframe-postgres

networks:
  raceframe-internal:
    external: true
