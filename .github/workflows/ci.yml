name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-bookworm@sha256:92620daddcd947f8d5ab5ba66e848702fe443d87fed30c4cea8e389fd78dfc55
        env:
          POSTGRES_DB: raceframe_test
          POSTGRES_USER: raceframe_test
          POSTGRES_PASSWORD: raceframe_test # pragma: allowlist secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raceframe_test -d raceframe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      RACEFRAME_SECRET_KEY: test-only-secret-key-with-at-least-32-bytes # pragma: allowlist secret
      DATABASE_URL: postgresql+psycopg://raceframe_test:raceframe_test@127.0.0.1:5432/raceframe_test # pragma: allowlist secret
      WORKER_API_TOKEN: test-only-worker-token-with-at-least-32-bytes # pragma: allowlist secret
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      PUBLIC_ORIGINS: http://localhost,http://testserver
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.lock
            requirements-dev.txt

      - name: Install backend and test dependencies
        run: |
          python -m pip install --require-hashes --requirement backend/requirements.lock
          python -m pip install --requirement requirements-dev.txt

      - name: Lint Python
        run: ruff check backend/app backend/migrations backend/tests raceframe-worker/worker.py raceframe-worker/tests

      - name: Run backend tests
        run: pytest --quiet --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=35
        working-directory: backend

      - name: Upload measured coverage baseline
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage.xml
          if-no-files-found: error
          retention-days: 30

      - name: Exercise complete migration chain
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade base
          alembic upgrade head
        working-directory: backend

      - name: Run lightweight worker safety tests
        run: |
          python -m pip install google-cloud-vision==3.15.0 numpy==2.4.6 pillow==12.3.0 requests==2.34.2
          python -m pytest --quiet raceframe-worker/tests

  dependency-and-secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install security tools
        run: python -m pip install --requirement requirements-dev.txt

      - name: Audit pinned Python dependencies
        run: |
          pip-audit --strict --no-deps --disable-pip --requirement backend/requirements.txt
          pip-audit --strict --no-deps --disable-pip --requirement raceframe-worker/requirements.txt
          pip-audit --strict --no-deps --disable-pip --requirement requirements-dev.txt

      - name: Scan tracked source for secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '(^|[\\/])(downloads|\.git|\.pytest_cache|\.ruff_cache)([\\/])' \
            --exclude-files '(^|[\\/])tmp_.*_bundle\.js$' \
            > /tmp/raceframe-secrets.json
          python -c "import json; data=json.load(open('/tmp/raceframe-secrets.json', encoding='utf-8')); count=sum(map(len, data.get('results', {}).values())); print(f'Potential secrets: {count}'); raise SystemExit(count != 0)"

      - name: Run high-severity static security checks
        run: bandit --quiet --recursive backend/app raceframe-worker/worker.py --exclude backend/tests,raceframe-worker/tests --severity-level high

  container-build-and-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build backend image
        run: docker build --build-arg VCS_REF=${GITHUB_SHA} --tag raceframe-backend:ci backend

      - name: Build worker image
        run: docker build --build-arg VCS_REF=${GITHUB_SHA} --tag raceframe-worker:ci raceframe-worker

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: raceframe-backend:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Scan worker image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: raceframe-worker:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
