version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    groups:
      backend-python:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: pip
    directory: /raceframe-worker
    schedule:
      interval: weekly
    groups:
      worker-python:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /raceframe-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /deploy/oci/raceframe-postgres
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
